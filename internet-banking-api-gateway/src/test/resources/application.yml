spring:
  application:
    name: internet-banking-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/javatodev/protocol/openid-connect/certs
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
